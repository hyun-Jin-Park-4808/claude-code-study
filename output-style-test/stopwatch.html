<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>스톱워치</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-blue-50 to-indigo-100 min-h-screen flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl shadow-2xl p-8 max-w-sm w-full">
        <!-- 타이틀 -->
        <h1 class="text-3xl font-bold text-center text-gray-800 mb-8">스톱워치</h1>

        <!-- 시간 표시 -->
        <div class="bg-gradient-to-r from-blue-500 to-indigo-600 rounded-xl p-8 mb-8 flex justify-center items-center">
            <div id="display" class="text-6xl font-mono font-bold text-white tracking-wider">
                00:00:00
            </div>
        </div>

        <!-- 버튼 컨테이너 -->
        <div class="flex gap-4 mb-4">
            <!-- 시작/일시정지 버튼 -->
            <button
                id="toggleBtn"
                onclick="toggleTimer()"
                class="flex-1 bg-green-500 hover:bg-green-600 text-white font-bold py-3 px-6 rounded-lg transition duration-200 transform hover:scale-105 active:scale-95"
            >
                시작
            </button>

            <!-- 리셋 버튼 -->
            <button
                id="resetBtn"
                onclick="resetTimer()"
                class="flex-1 bg-red-500 hover:bg-red-600 text-white font-bold py-3 px-6 rounded-lg transition duration-200 transform hover:scale-105 active:scale-95"
            >
                리셋
            </button>
        </div>
    </div>

    <script>
        let seconds = 0;
        let minutes = 0;
        let hours = 0;
        let isRunning = false;
        let intervalId = null;

        // 시간을 00:00:00 형식으로 포맷
        function formatTime() {
            const h = String(hours).padStart(2, '0');
            const m = String(minutes).padStart(2, '0');
            const s = String(seconds).padStart(2, '0');
            return `${h}:${m}:${s}`;
        }

        // 화면 업데이트
        function updateDisplay() {
            document.getElementById('display').textContent = formatTime();
        }

        // 타이머 토글 (시작/일시정지)
        function toggleTimer() {
            const btn = document.getElementById('toggleBtn');

            if (isRunning) {
                // 일시정지
                clearInterval(intervalId);
                isRunning = false;
                btn.textContent = '시작';
                btn.classList.remove('bg-yellow-500', 'hover:bg-yellow-600');
                btn.classList.add('bg-green-500', 'hover:bg-green-600');
            } else {
                // 시작
                isRunning = true;
                btn.textContent = '일시정지';
                btn.classList.remove('bg-green-500', 'hover:bg-green-600');
                btn.classList.add('bg-yellow-500', 'hover:bg-yellow-600');

                intervalId = setInterval(() => {
                    seconds++;

                    // 60초가 되면 분으로 변환
                    if (seconds === 60) {
                        seconds = 0;
                        minutes++;
                    }

                    // 60분이 되면 시간으로 변환
                    if (minutes === 60) {
                        minutes = 0;
                        hours++;
                    }

                    updateDisplay();
                }, 1000);
            }
        }

        // 리셋
        function resetTimer() {
            clearInterval(intervalId);
            seconds = 0;
            minutes = 0;
            hours = 0;
            isRunning = false;

            // 버튼 상태 초기화
            const btn = document.getElementById('toggleBtn');
            btn.textContent = '시작';
            btn.classList.remove('bg-yellow-500', 'hover:bg-yellow-600');
            btn.classList.add('bg-green-500', 'hover:bg-green-600');

            updateDisplay();
        }

        // 초기 화면 설정
        updateDisplay();
    </script>
</body>
</html>

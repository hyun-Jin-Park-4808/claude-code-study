<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>할 일 목록</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-blue-50 to-indigo-100 min-h-screen py-8">
    <div class="max-w-md mx-auto">
        <!-- 메인 카드 -->
        <div class="bg-white rounded-lg shadow-xl p-6">
            <h1 class="text-3xl font-bold text-gray-800 mb-6">할 일 목록</h1>

            <!-- 입력 섹션 -->
            <div class="flex gap-2 mb-6">
                <input
                    id="todoInput"
                    type="text"
                    placeholder="할 일을 입력하세요..."
                    class="flex-1 px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                    onkeypress="handleKeyPress(event)"
                >
                <button
                    onclick="addTodo()"
                    class="bg-blue-500 hover:bg-blue-600 text-white font-bold px-6 py-2 rounded-lg transition-colors"
                >
                    추가
                </button>
            </div>

            <!-- 할 일 목록 -->
            <div id="todoList" class="space-y-2">
                <!-- 할 일 항목이 여기에 추가됨 -->
            </div>

            <!-- 빈 상태 메시지 -->
            <div id="emptyMessage" class="text-center text-gray-400 py-8">
                <p class="text-sm">아직 할 일이 없습니다!</p>
            </div>

            <!-- 통계 -->
            <div class="mt-6 pt-6 border-t border-gray-200">
                <div class="flex justify-between text-sm text-gray-600">
                    <span>전체: <span id="totalCount" class="font-bold text-gray-800">0</span></span>
                    <span>완료: <span id="completedCount" class="font-bold text-green-600">0</span></span>
                </div>
            </div>
        </div>
    </div>

    <script>
        let todos = [];

        function addTodo() {
            const input = document.getElementById('todoInput');
            const text = input.value.trim();

            if (text === '') {
                alert('할 일을 입력해주세요!');
                return;
            }

            const todo = {
                id: Date.now(),
                text: text,
                completed: false
            };

            todos.push(todo);
            input.value = '';
            input.focus();
            render();
        }

        function deleteTodo(id) {
            todos = todos.filter(todo => todo.id !== id);
            render();
        }

        function toggleTodo(id) {
            const todo = todos.find(t => t.id === id);
            if (todo) {
                todo.completed = !todo.completed;
                render();
            }
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                addTodo();
            }
        }

        function render() {
            const todoList = document.getElementById('todoList');
            const emptyMessage = document.getElementById('emptyMessage');
            const totalCount = document.getElementById('totalCount');
            const completedCount = document.getElementById('completedCount');

            // 통계 업데이트
            totalCount.textContent = todos.length;
            completedCount.textContent = todos.filter(t => t.completed).length;

            // 빈 상태 처리
            if (todos.length === 0) {
                todoList.innerHTML = '';
                emptyMessage.style.display = 'block';
                return;
            }

            emptyMessage.style.display = 'none';

            // 할 일 목록 렌더링
            todoList.innerHTML = todos.map(todo => `
                <div class="flex items-center gap-3 p-3 bg-gray-50 rounded-lg hover:bg-gray-100 transition-colors">
                    <input
                        type="checkbox"
                        ${todo.completed ? 'checked' : ''}
                        onchange="toggleTodo(${todo.id})"
                        class="w-5 h-5 text-blue-500 rounded focus:ring-2 focus:ring-blue-500 cursor-pointer"
                    >
                    <span class="flex-1 ${todo.completed ? 'line-through text-gray-400' : 'text-gray-700'}">
                        ${escapeHtml(todo.text)}
                    </span>
                    <button
                        onclick="deleteTodo(${todo.id})"
                        class="text-red-500 hover:text-red-700 hover:bg-red-50 px-3 py-1 rounded transition-colors"
                    >
                        삭제
                    </button>
                </div>
            `).join('');
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // 초기 렌더링
        render();
    </script>
</body>
</html>

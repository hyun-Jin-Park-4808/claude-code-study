<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>카운터 앱</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">
    <div class="flex items-center justify-center min-h-screen">
        <div class="bg-white rounded-lg shadow-lg p-8 w-80">
            <h1 class="text-2xl font-bold text-center text-gray-800 mb-8">카운터</h1>

            <!-- 카운트 표시 -->
            <div class="bg-gray-50 rounded-lg p-8 mb-8 text-center">
                <p class="text-gray-600 text-sm mb-2">현재 카운트</p>
                <p id="count" class="text-5xl font-bold text-blue-600">0</p>
            </div>

            <!-- 버튼 그룹 -->
            <div class="grid grid-cols-3 gap-3 mb-4">
                <button onclick="decrease()" class="bg-blue-500 hover:bg-blue-600 text-white font-bold py-3 rounded-lg transition-colors">
                    -1
                </button>
                <button onclick="reset()" class="bg-gray-500 hover:bg-gray-600 text-white font-bold py-3 rounded-lg transition-colors">
                    초기화
                </button>
                <button onclick="increase()" class="bg-blue-500 hover:bg-blue-600 text-white font-bold py-3 rounded-lg transition-colors">
                    +1
                </button>
            </div>

            <!-- 대형 증가 버튼 -->
            <button onclick="increase()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-lg transition-colors text-lg">
                증가
            </button>
        </div>
    </div>

    <script>
        let count = 0;

        function increase() {
            count++;
            updateDisplay();
        }

        function decrease() {
            count--;
            updateDisplay();
        }

        function reset() {
            count = 0;
            updateDisplay();
        }

        function updateDisplay() {
            document.getElementById('count').textContent = count;
        }
    </script>
</body>
</html>
